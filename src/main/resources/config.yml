
ENABLED: true
SETTINGS:
  PLAYERS-IN-RTP: 150
  MAX-ATTEMPTS: 25
  COUNTDOWN: 5

  # --- Location Pool Settings ---
  # How many safe locations to pre-generate per world and keep ready.
  # When a player RTP's, a location is instantly pulled from the pool.
  # The pool refills in the background on your powerful CPU.
  POOL-SIZE: 20

  # How often (in ticks) to attempt refilling the pool. 20 ticks = 1 second.
  # Lower = faster refill. With a pre-generated world and powerful CPU, 1-2s is fine.
  POOL-REFILL-INTERVAL: 40

  # How many locations to try generating per refill tick (runs async).
  # Higher = pool fills faster but uses more CPU per tick.
  POOL-FILL-BATCH: 5

MESSAGES:
  DISABLED: "&cRTP is currently disabled."
  COOLDOWN: "&cYou can't rtp for another {remaining}s."
  MAX-PLAYERS: "&cToo many players are using RTP right now. Please try again later."
  WORLD-NOT-EXIST: "&cThe world does not exist."
  SEARCHING: "&dSearching for a safe location..."
  SAFE-LOCATION-FOUND: ""
  MAX-ATTEMPTS: "&cCould not find a safe location after {attempts} attempts."
  DESTINATION-DISABLED: "&cThis RTP destination is currently disabled."
  UNSAFE-LOCATION: "&cThe location is unsafe"
  POOL-WARMING: "&eRTP pool is warming up, please try again in a moment."

DENIED-WORLDS:
  - afk

